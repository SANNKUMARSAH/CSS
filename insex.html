<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Display Property</title>
  <style>
    .box1 {
      width: 200px;
      height: 100px;
      padding: 20px;
      border: 5px solid black;
      margin: 20px;
      background-color: lightblue;
    }

    .box2 {
      width: 200px;
      height: 100px;
      padding: 20px;
      border: 5px solid black;
      margin: 20px;
      background-color: lightgreen;
    }

    .box3 {
      width: 200px;
      height: 100px;
      padding: 20px;
      border: 5px solid black;
      margin: 20px;
      background-color: lightcoral;
    }

    #first {
      display: block;
      width: 200px;
      height: 100px;
      padding: 20px;
      border: 5px solid black;
      margin: 20px;
      background-color: lightblue;
    }
    #second {
      display: inline-block;
      width: 200px;
      height: 100px;
      padding: 20px;
      border: 5px solid black;
      margin: 20px;
      background-color: lightgreen;
    }

    #third {
      display: inline green;
      width: 200px;
      height: 100px;
      padding: 20px;
      border: 5px solid black;
      margin: 200px;
      background-color: lightcoral;
    }
  </style>
</head>
<body>
  <div id="box1" class="box1">Box1</div>
  <div id="box2" class="box2">Box2</div>
  <div id="box3" class="box3">Box3</div>
  <div id="first">First</div>
  <div id="second">Second</div>
  <div id="third">Third</div>

</body>
</html>
